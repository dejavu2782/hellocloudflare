name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hello-cloudflare-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hello-cloudflare-react

      - name: Build
        run: npm run build
        working-directory: hello-cloudflare-react

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: hello-cloudflare-react
          directory: hello-cloudflare-react/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
